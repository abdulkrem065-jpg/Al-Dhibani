<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الذيباني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; }
        .product-card { transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">متجر الذيباني</h1>
            <span class="bg-yellow-500 text-blue-900 px-3 py-1 rounded-full text-sm font-bold">صنعاء - شارع النصر</span>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <h2 class="text-xl font-bold mb-6 text-blue-800 border-r-4 border-yellow-500 pr-3">أحدث المنتجات</h2>
        
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <p class="text-center col-span-full text-gray-500">جاري تحميل المنتجات من المخزن...</p>
        </div>
    </div>

    <script>
        // معرف الجدول الخاص بك
        const sheetId = '11hPa_HfFI6rdbbohRd1rrc1IgEerXd3f64oFCEN0OX0';
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        async function loadProducts() {
            try {
                const response = await fetch(base);
                const text = await response.text();
                const data = JSON.parse(text.substr(47).slice(0, -2));
                
                const rows = data.table.rows;
                const container = document.getElementById('products-container');
                container.innerHTML = '';

                rows.forEach((row, index) => {
                    // نتخطى السطر الأول إذا كان يحتوي على العناوين
                    if (index === 0) return; 

                    const name = row.c[0] ? row.c[0].v : 'بدون اسم';
                    const desc = row.c[1] ? row.c[1].v : '';
                    const price = row.c[2] ? row.c[2].v : 'اتصل للسعر';
                    const img = row.c[3] ? row.c[3].v : 'https://via.placeholder.com/300x200?text=Al-Dhibani';
                    const category = row.c[4] ? row.c[4].v : 'عام';

                    container.innerHTML += `
                        <div class="product-card bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                            <img src="${img}" class="w-full h-48 object-cover" alt="${name}">
                            <div class="p-4">
                                <span class="text-xs text-blue-600 font-bold uppercase">${category}</span>
                                <h3 class="text-lg font-bold mt-1 text-gray-800">${name}</h3>
                                <p class="text-gray-600 text-sm mt-1 h-10 overflow-hidden">${desc}</p>
                                <div class="flex justify-between items-center mt-4">
                                    <span class="text-blue-700 font-bold text-xl">${price}</span>
                                    <button class="bg-yellow-500 hover:bg-yellow-600 text-blue-900 px-4 py-2 rounded-lg text-sm font-bold transition">طلب الآن</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
                document.getElementById('products-container').innerHTML = '<p class="text-red-500 text-center col-span-full">حدث خطأ أثناء تحميل المنتجات. تأكد من إعدادات المشاركة في الجدول.</p>';
            }
        }

        loadProducts();
    </script>
</body>
</html>
