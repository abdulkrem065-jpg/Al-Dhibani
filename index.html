<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر الذيباني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-right">
    <nav class="bg-blue-900 text-white p-6 shadow-xl mb-8">
        <h1 class="text-3xl font-bold text-center">متجر الذيباني للتجارة العامة</h1>
    </nav>

    <div id="products-container" class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- المنتجات ستظهر هنا -->
        <p class="text-center col-span-full text-xl text-gray-600">جاري الاتصال بالجدول وتحميل المنتجات...</p>
    </div>

    <script>
        // الرابط الجديد المباشر من واقع صورة النشر الخاصة بك
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTAWoiCkC5DRkyu6Sg_PphfUdGDJsFZ5PVK3eDh613iOg4rkJ_es78x2F2W-kpVbxxLvtMTVXY14sX/pub?output=csv';

        async function loadProducts() {
            try {
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // تخطي السطر الأول
                
                let html = '';
                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols[0]) {
                        html += `
                            <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 transform hover:scale-105 transition duration-300">
                                <div class="p-6">
                                    <h2 class="text-2xl font-bold text-blue-900 mb-2">${cols[0]}</h2>
                                    <p class="text-gray-500 mb-4">${cols[3] || 'قسم المنتجات'}</p>
                                    <div class="flex justify-between items-center border-t pt-4">
                                        <span class="text-2xl font-bold text-green-600">${cols[2]} ريال</span>
                                        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">اطلب الآن</button>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('products-container').innerHTML = html;
            } catch (error) {
                document.getElementById('products-container').innerHTML = 
                    '<p class="text-center col-span-full text-red-500 text-xl">حدث خطأ في الاتصال. يرجى التأكد من تشغيل الإنترنت وإعادة المحاولة.</p>';
            }
        }

        loadProducts();
    </script>
</body>
</html>
