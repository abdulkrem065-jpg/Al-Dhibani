<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجرالذيباني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cairo&display=swap'); body{font-family:'Cairo',sans-serif;}</style>
</head>
<body class="bg-gray-50 pb-24">
    <header class="bg-blue-600 text-white p-6 text-center shadow-md">
        <h1 class="text-2xl font-bold">متجرالذيباني</h1>
        <p>مواد غذائية - إكسسوارات - شحن ألعاب</p>
    </header>

    <div class="p-4 flex flex-col gap-6">
        <section>
            <h2 class="text-xl font-bold mb-3 border-b-2 border-blue-600">🎮 قسم شحن الألعاب</h2>
            <div class="bg-white p-4 rounded-lg shadow">
                <h3 class="font-bold">شحن 100 جوهرة / شدة</h3>
                <input type="text" id="game_id" placeholder="أدخل الآيدي (ID) هنا" class="w-full border p-2 my-2 rounded">
                <button onclick="addToCart('شحن ألعاب', 10, 'game_id')" class="bg-blue-500 text-white w-full py-2 rounded">إضافة للطلب</button>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-bold mb-3 border-b-2 border-green-600">🍏 قسم المواد الغذائية</h2>
            <div class="bg-white p-4 rounded-lg shadow">
                <h3 class="font-bold">منتج غذائي (مثال)</h3>
                <p class="text-green-600 font-bold">5$</p>
                <button onclick="addToCart('منتج غذائي', 5)" class="bg-green-500 text-white w-full py-2 rounded mt-2 text-sm">إضافة للسلة</button>
            </div>
        </section>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-between items-center shadow-inner">
        <div class="font-bold text-lg">الإجمالي: <span id="total">0</span>$</div>
        <button onclick="sendOrder()" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold">إرسال عبر واتساب</button>
    </div>

    <script>
        let cart = []; let total = 0;
        function addToCart(name, price, idField = null) {
            let extra = idField ? " (ID: " + document.getElementById(idField).value + ")" : "";
            if(idField && !document.getElementById(idField).value) return alert("فضلاً أدخل الـ ID");
            cart.push(name + extra); total += price;
            document.getElementById('total').innerText = total;
            alert("تمت الإضافة!");
        }
        function sendOrder() {
            if(cart.length == 0) return alert("السلة فارغة");
            let phone = "967770493341"; // ضع رقمك هنا بالصيغة الدولية
            let msg = encodeURIComponent("طلب جديد من متجرالذيباني:\n" + cart.join("\n") + "\n\nالإجمالي: " + total + "$");
            window.open("https://wa.me/" + phone + "?text=" + msg);
        }
    </script>
</body>
</html>
